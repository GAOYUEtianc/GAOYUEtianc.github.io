SFT is the step that turns a pre-trained base model into one that follows instructions. The model architecture, loss function, and tokenizer all stay the same as pre-training, what changes is the loss masking (which tokens contribute to loss) and a few engineering details to make training efficient.

This blog covers four building blocks of SFT, in the order they depend on each other:

1. **Loss masking** — what tokens should compute loss, and why

1. **Padding and packing** — how to batch sequences of different lengths

1. **Memory** — what fits in GPU memory and what does not

1. **LoRA** — how to fine-tune large models with fewer trainable parameters

## Loss Masking

After pretraining, the base model can do next-token prediction. The purpose of SFT is to turn continuation writing into instructed answering. Since the architecture, loss function (cross entropy), and tokenizer are unchanged, the only thing SFT does differently is decide which tokens the loss is computed on.

### Which tokens should compute loss

Think about inference: the input is \`[system + user]\`, which is fixed, and the model only generates the \`assistant\` answer from it. The system and user parts are given, and the model never predicts them. Training should match this, so the loss should only be computed on the tokens that the model is supposed to generate. This is called **train-inference symmetry**. In multi-turn conversation, the user parts in later rounds are also not counted in loss.

Let the sequence be MATHPLACEHOLDER21ENDMATH, and define a binary mask MATHPLACEHOLDER22ENDMATH where MATHPLACEHOLDER23ENDMATH if MATHPLACEHOLDER24ENDMATH is generated by the assistant:

MATHPLACEHOLDER0ENDMATH

### Implementation

The PyTorch convention is to set \`labels[t] = -100\` at positions where we don't want loss. \`F.cross_entropy(ignore_index=-100)\` will skip these positions, both in the loss and in the count for averaging. The \`-100\` is just the default value PyTorch picked.

\`\`\`python
input_ids = tokenizer(text)["input_ids"]
labels = input_ids.copy()

for t in range(len(input_ids)):
    if not is_assistant_token(t):
        labels[t] = -100
\`\`\`

### The shift trick

There is one common pitfall. A causal LM's output logits at position MATHPLACEHOLDER25ENDMATH is: after seeing MATHPLACEHOLDER26ENDMATH, predict MATHPLACEHOLDER27ENDMATH. So when computing loss, we use \`logits[:-1]\` to predict \`labels[1:]\` , i.e., shift the labels by one.

\`\`\`python
shift_logits = logits[..., :-1, :].contiguous()    # (B, T-1, V)
shift_labels = labels[..., 1:].contiguous()        # (B, T-1)
loss = F.cross_entropy(
    shift_logits.view(-1, shift_logits.size(-1)),   # (B*(T-1), V)
    shift_labels.view(-1),                          # (B*(T-1))
    ignore_index=-100,                          # skip when labels are -100
)
\`\`\`

During SFT, never trust the train loss alone, always sanity-check the inference output.

Note: some HuggingFace \`*ForCausalLM\` classes do the shift internally. 

### Normalization: token-level vs sequence-level

The denominator MATHPLACEHOLDER28ENDMATH in the loss formula can be computed in two ways:

- **Token-level**: average over all assistant tokens in the batch. PyTorch's \`F.cross_entropy(reduction='mean')\` does this by default. Loss is dominated by long responses.

- **Sequence-level**: first average within each sample, then average across samples. Each sample contributes equally, regardless of length.

The choice affects what kind of behaviour the model favours. Token-level training pushes the model toward longer, more detailed responses because they dominate the gradient. Sequence-level training gives every sample equal weight, leading to a more diverse training signal.

Mistral and Llama recipes mostly use token-level normalization. DeepSeek uses sequence-level. There is no universally right answer, it is a data distribution prior you should choose deliberately.

## Padding & Packing

Now that we’ve known how to compute the SFT loss of a sequence, but as the sequence length in the batch are different, how to put them in GPU to optimize GPU utility ?

GPU likes fixed shaped rectangular tensor MATHPLACEHOLDER29ENDMATH, a batch must be of this shape to run forward. In order to turn long sequence into rectangular, there’re only 2 ways : 

| Method | Description | Cons |
|---|---|---|
| Padding | use pad token to make all length = max_len | Waste computation resource (as pad also runs forward) |
| Packing | Packing multiple short sequences into a long one | Complicated implementation |

### Padding

Pad every sequence to \`max_len\` in the batch (or to a global \`max_seq_len\`):

\`\`\`javascript

sample 1:  ████████████████████    (20 real)
sample 2:  ████■■■■■■■■■■■■■■■■    (4 real + 16 pad)
sample 3:  ████████████■■■■■■■■    (12 real + 8 pad)

■ = pad_token
\`\`\`

**1. Attention mask.** With \`attention_mask: (B, T)\` where 1 = real, 0 = pad, the transformer combines it with the causal mask — at position MATHPLACEHOLDER30ENDMATH, valid keys are positions MATHPLACEHOLDER31ENDMATH where MATHPLACEHOLDER32ENDMATH **and** \`attention_mask[j] = 1\`.

**2. Loss mask.** Pad positions get \`labels[t] = -100\`. No gradient flows through them.

**Right-pad vs left-pad.** Training with right-pads, inference with left-pads:

- Training: causal LM processes left-to-right, real tokens at MATHPLACEHOLDER35ENDMATH align naturally with the shift trick in loss computation.

- Generation: each batched step produces the next token per sample. All samples must align at the right edge so "next position" lands at the same column across the batch. Left-pad puts pad in front, real tokens in back, all sample tails at the same position.

In picture form (4 samples):

\`\`\`javascript

A  [  L  |   0  |  0  |  0  ]
B  [  0  |   L  |  0  |  0  ]   L = lower triangular
C  [  0  |   0  |  L  |  0  ]
D  [  0  |   0  |  0  |  L  ]

MATHPLACEHOLDER4ENDMATH

For our example it’s: \`[0..7, 0..19, 0..3, 0..11]\`. Each sample's RoPE rotations match what they would be if the sample were trained alone.

\`\`\`python
from flash_attn import flash_attn_varlen_func

out = flash_attn_varlen_func(
    q, k, v,                                  # (total_tokens, n_heads, head_dim)
    cu_seqlens_q=cu_seqlens,                  # (num_samples + 1,)

    max_seqlen_q=max(segment_lengths),

The kernel iterates over segments and runs an independent causal FlashAttention per segment. Zero cross-sample compute, zero mask materialization.

## QLoRA — Use 4-bit Quantization of Base Model

Although LoRA can compress the number of trainable parameters largely, it can be noticed that the frozen base model’s parameter occupies a large portion of the memory. A nature question flows : Since it never needs an update, can we further press it?

QLoRA resolves this by 4-bit quantization of the base model.

### LLM Weights Are not Uniform

If you directly do INT4 (16 equal-length level) to weights : 

\`\`\`python
INT4 levels:  -1.0  -0.87  -0.73  ...  -0.07  0.07  ...  0.87  1.0
               ↑                            ↑                   ↑
             few weights             lots of weight here    few weights
\`\`\`

After pre-training, LLM weights is nearly a Gaussian distribution with a sparse tail. INT4 will put 16 levels uniformly on [-1, 1] : The levels in the middle will be crowded, while the levels in boundary is barely used, causing a waste of bits at low density zone. 

A optimal solution from information theory perspective is quantile quantization — NF4 (NormalFloat 4-bit). This is a 4-bit specifically designed for normal distribution, where 16 levels are 16 quantiles of unit Gaussian. NF4 is thus more information-theoretically optimal, which leads to lower perplexity degradation.

One caveat : QLoRA trades time for space. During training, every forward / backward matmul needs an on-the-fly dequantization from NF4 to bf16, causing roughly MATHPLACEHOLDER171ENDMATH slowdown compared to LoRA.
