This lecture traces the evolution of Transformer architecture from 2017 to 2025, covering normalization, activation functions, positional encoding, attention variants, hyperparameter selection, and training stability techniques.

---

## Architecture Evolution Overview

The table below summarizes design choices across major models (2017–2025), varying in normalization placement, activation functions, FFN structure, attention variants, and positional encodings.

![Different aspects of transformers across the big LMs](https://raw.githubusercontent.com/GAOYUEtianc/GAOYUEtianc.github.io/master/img/Transformer_design.png)

CS336 implements an engineering-optimized Transformer variant with the following changes from the original:

| Component | Original | CS336 Variant |
| --- | --- | --- |
| Normalization | Post-Norm + LayerNorm | Pre-Norm + RMSNorm |
| Positional Encoding | Sinusoidal | RoPE (inside causal MHA) |
| Activation | ReLU | SwiGLU |
| Bias terms | Present | Removed |
| Input/output embeddings | — | Residual addition + token-level norm |

## Positional Encoding: RoPE

After 2023, RoPE replaced sinusoidal, absolute, ALiBi, and other relative encoding schemes as the standard choice. Its key advantages are native relative position encoding and strong long-context generalization.

**Core idea:** inner products are invariant under rotation, so encoding position as a rotation makes attention scores depend only on relative position, not absolute position.

The d-dimensional embedding vector is partitioned into d/2 pairs. Each pair is rotated by an angle proportional to the token position m and a pair-specific frequency MATHPLACEHOLDER26ENDMATH:

## Attention Variants

### GQA (Grouped-Query Attention)

KV cache is the primary memory bottleneck during autoregressive inference: storing key and value tensors for all heads across all past tokens grows linearly with sequence length and batch size.

**MQA (Multi-Query Attention)** reduces this by sharing a single KV head across all query heads. **GQA (Grouped-Query Attention)** is a generalization: query heads are partitioned into groups, each group sharing one KV head.

![GQA](https://raw.githubusercontent.com/GAOYUEtianc/GAOYUEtianc.github.io/master/img/GQA.png)

GQA achieves near-MHA quality with near-MQA memory cost and has become the industry standard.

### Long-Context Attention

For context windows beyond 10M tokens, vanilla full attention is computationally prohibitive. The current standard combines:

**Sliding Window Attention (SWA):** each token attends only to a local window of MATHPLACEHOLDER43ENDMATH tokens. Effective receptive field = MATHPLACEHOLDER44ENDMATH.

![Sliding Window Attention](https://raw.githubusercontent.com/GAOYUEtianc/GAOYUEtianc.github.io/master/img/sliding_window.png)

**Mixed Attention:** every 2–4 Transformer blocks form a group. One block per group uses full attention without positional encoding (NoPE) for long-range information propagation; the remaining blocks use RoPE + SWA for local context. This balances memory cost, compute, and long-range coherence.
