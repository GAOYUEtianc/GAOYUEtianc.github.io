---

This lecture builds from tensors up to a full model, optimizer, and training loop. The central theme is developing a computation accounting mindset, understanding memory and compute costs at every step to build efficient large models.

---

## Memory Accounting

### Tensors

Tensors are the fundamental unit of storage in deep learning — parameters, gradients, optimizer states, activations, and data are all tensors. Rather than pure mathematical arrays, a tensor is **a pointer to VRAM + metadata**. Tensors live on a contiguous block of RAM, with stride metadata defining how multi-dimensional indices map to that flat array. Multiple tensors can share the same underlying memory, avoiding copies and saving RAM significantly.

### View and Contiguous

\`view()\` reshapes a tensor by modifying only its metadata — no data is copied, no extra memory is allocated. Key properties:

- **Data sharing:** tensors created via \`view()\` share the underlying memory block; mutating one affects the other.
- **No copying:** the most memory-efficient way to reshape.
- **Contiguity requirement:** only works on contiguous tensors with the same total element count.

Operations like \`transpose()\` and \`permute()\` break contiguity by changing the index-to-memory mapping. In these cases, \`contiguous()\` force-rearranges the data into a fresh contiguous block, restoring \`view()\` compatibility — but at the cost of a data copy and extra memory. Avoid \`contiguous()\` unless necessary.

### Float Precision

Memory occupied by a tensor = **number of elements × bytes per element**.

| Format | Bytes | Notes |
| --- | --- | --- |
| FP32 | 4 | Standard full precision |
| FP16 | 2 | Prone to under/overflow; largely replaced |
| BF16 | 2 | Same dynamic range as FP32, lower mantissa precision; preferred for forward pass |
| FP8 | 1 | H100+ only; active research area; instability remains a challenge |

### Mixed Precision Training

Different stages use different precisions to balance memory, stability, and speed:

- **Forward pass activations:** BF16 or FP8
- **Weights, gradients, optimizer states:** FP32

The rule of thumb: accumulated state (weights, optimizer) uses high precision; transient forward-pass values use lower precision. PyTorch AMP and NVIDIA Transformer Engine both support this out of the box.

---

## Computation Accounting

### CPU vs. GPU

Tensors default to CPU. Move them explicitly:

\`\`\`python

x.to("cuda:0")                              # move existing tensor
torch.zeros(32, 32, device="cuda:0")        # create directly on GPU
\`\`\`

Always be explicit about which device each tensor lives on.

### Elementwise vs. Matrix Operations

- **Elementwise** (sqrt, power, triu, etc.): FLOPs scale linearly with tensor size.
- **Matrix multiplication:** MATHPLACEHOLDER0ENDMATH cost; the dominant operation in deep learning. GPUs and TPUs are architecturally optimized for it.

For an MATHPLACEHOLDER1ENDMATH matmul: MATHPLACEHOLDER2ENDMATH. This holds for batched matmuls with broadcasting.

### Code Readability: \`einops\` and \`jaxtyping\`

\`einops\` replaces error-prone numeric indexing with named dimensions:

\`\`\`python

from einops import rearrange, einsum, reduce

einsum(x, x, "b s1 h, b s2 h -> b s1 s2")  # batched matmul (vs. x @ x.transpose(-2,-1))
reduce(x, "b s h -> b s", "mean")          # mean over last dim
rearrange(x, "b s (h d) -> b s h d", h=2). # split hidden into heads × head_dim

from jaxtyping import Float
x: Float[torch.Tensor, "batch sequence hidden"] = torch.ones(16, 256, 8)
\`\`\`

\`torch.compile\` further optimizes \`einsum\` by finding the best contraction order automatically.

### FLOPs and MFU

- **FLOPs:** total floating-point operations performed
- **FLOP/s:** throughput (e.g., H100 dense BF16 peak ≈ 989.5 TFLOP/s)

MATHPLACEHOLDER3ENDMATH

- MFU > 0.5 is excellent; MFU ≈ 5% indicates severe underutilization
- BF16 achieves substantially higher MFU than FP32

## Building the Full Pipeline

### Weight Initialization

Poor initialization causes gradient explosion or vanishing. **Xavier initialization** scales weights by MATHPLACEHOLDER14ENDMATH, keeping output variance independent of input dimension. Combined with truncated normal sampling:

\`\`\`python
w = nn.Parameter(nn.init.trunc_normal_(
    torch.empty(input_dim, output_dim),
    std=1 / np.sqrt(input_dim), a=-3, b=3
))
\`\`\`

### Stochasticity Control

Fix all random seeds to ensure reproducibility:

\`\`\`python

torch.manual_seed(1234)
np.random.seed(1234)
random.seed(1234)
\`\`\`

### Data Loading

Training datasets at industry scale (TB+) can't be loaded into memory at once. \`np.memmap\` memory-maps files on disk, loading only the requested chunks on access. For efficient CPU→GPU transfer: use \`pin_memory=True\` and \`non_blocking=True\` to overlap data loading with GPU compute.

### Optimizer

SGD → AdaGrad (adaptive LR via accumulated gradient squares) → Adam (momentum + RMSProp). Adam is the standard for LLM training.

### Memory Cost Breakdown (FP32)

4 bytes × (parameters + gradients + optimizer states + activations)

- Adam stores two momentum buffers per parameter, making optimizer state the largest non-activation cost
- Activations are typically the largest contributor overall
- Activation checkpointing recomputes activations during the backward pass rather than storing them, trading compute for memory

### Training Loop

**One-time setup:** define model → move to GPU → define optimizer

**Per-iteration:**

1. Load batch
2. Forward pass → compute loss
3. Backward pass → compute gradients
4. Optimizer step → update weights
5. Zero gradients → free memory

Checkpoint \`{model weights, optimizer state, step}\` regularly to guard against crashes.

---

## Summary

| Topic | Key Takeaway |
| --- | --- |
| Memory | Total = elements × bytes; share memory via \`view()\` rather than copying |
| Precision | BF16 for forward pass, FP32 for accumulated state; FP8 is emerging |
| FLOPs | Training ≈ 6 × params × tokens; matmul dominates |
| MFU | Target > 0.5; BF16 helps significantly |
| Initialization | Xavier + truncated normal for stability |
| Data loading | \`memmap\` + pinned memory + async transfer |

**Industry trends:** the field is pushing toward lower precision throughout (FP8 full-pipeline training is becoming viable), aggressive inference quantization, and hardware-co-designed architectures where model design is increasingly shaped by GPU constraints.
