**FlashAttention** improves the efficiency of attention computation itself — minimizing HBM ↔ SRAM traffic through tiling, online softmax, and kernel fusion. For **PagedAttention**, the math is unchanged compared to FlashAttention, but it addresses a different problem, ***how the KV cache is laid out in memory during inference***. By replacing contiguous, max-length KV allocation with a paged layout of fixed-size blocks, it removes the fragmentation that otherwise caps serving throughput.

The two techniques are orthogonal and complementary. vLLM uses both:

- **Prefill stage.** When the full prompt is available, attention over the prompt is computed with a FlashAttention-style fused kernel, and the resulting K, V vectors are written into the paged cache.
- **Decode stage.** As tokens are generated one at a time, the KV cache must grow incrementally. PagedAttention manages this growth — allocating physical blocks on demand and routing the attention kernel through a per-sequence block table.

This blog walks through PagedAttention from first principles: what it solves, how the block table is defined and maintained, how the kernel uses it, and a concrete end-to-end decode example.

## The Memory Bottleneck in LLM Serving

The bottleneck of LLM serving is the **KV cache**. Every generated token needs the K and V vectors of all previous tokens in order to compute attention, and these vectors are cached so that subsequent tokens do not redo the prior projections. The cache size scales as

MATHPLACEHOLDER0ENDMATH

where MATHPLACEHOLDER3ENDMATH is the number of layers, MATHPLACEHOLDER4ENDMATH the number of heads, MATHPLACEHOLDER5ENDMATH the head dimension, and the leading 2 covers both K and V.

For LLaMA-7B in \`fp16\` at \`seq_len = 2048\`, this works out to roughly 1 GB per sequence. An 80 GB A100 should in principle hold \\~70 concurrent sequences, but a naive serving system gets nowhere near that. Three independent forms of waste explain the gap:

1. **Internal fragmentation.** The actual generation length is unknown until EOS, so the system must reserve \`max_seq_len\` slots up front. A request that generates only 100 tokens leaves 1948 slots wasted.
2. **External fragmentation.** Sequences of varying lengths are released in arbitrary order, leaving holes of varying sizes. A new request larger than every hole cannot be served, even when the total free space would suffice.
3. **Reservation waste.** During generation, the unused tail of an active request's reserved slab is locked to that request and cannot be borrowed by another.

The vLLM paper measured these together at **60–80% of the total KV cache budget**. Reducing this waste is the entire point of PagedAttention.

## The Core Idea: Paged KV Cache

PagedAttention applies the same idea operating systems use to manage process memory: **fixed-size physical blocks, plus a per-process page table that translates logical positions to physical locations**. The mapping is direct if you think of it as OS concepts:

| OS concept | PagedAttention |
|---|---|
| Process | One sequence |
| Virtual address space | Logical KV cache (positions 0, 1, 2, ...) |
| Physical memory | GPU HBM |
| Page | KV block: fixed-size, holds K and V for MATHPLACEHOLDER6ENDMATH tokens |
| Page table | Block table |

## Block Table Lifecycle

The block table is not pre-divided. It is built and torn down dynamically as sequences come and go. There are four stages.

### Server startup (once)

\`\`\`
1. Allocate the KV pool:
     total = HBM_available - model_weights - activations - ...
     N = total // block_size

2. Initialize the free list:
     free_list = [0, 1, 2, ..., N-1]   # all phys blocks available
     (typically a stack — LIFO gives better cache locality)

3. Initialize the block_table tensor:
     shape (max_num_seqs, max_blocks_per_seq), all -1

4. Initialize refcount[phys_id] = 0 for all phys blocks, indicating all phys blocks are empty
\`\`\`

After startup, **the physical block indices MATHPLACEHOLDER21ENDMATH carry no semantics** — they are array offsets into the KV pool.

### New sequence (triggered by Prefill)

\`\`\`python
num_blocks = ceil(prompt_len / B)
for i in range(num_blocks):
    phys_id = free_list.pop()
    block_table[seq_id, i] = phys_id
    refcount[phys_id] = 1
\`\`\`

The block table gets populated via pop from the free list. The pop order is arbitrary, so adjacent logical blocks frequently land on physically distant phys blocks.

### Decode step (per generated token)

\`\`\`python
last_slot = p % B
if last_slot == 0:                # the previous logical block is now full
    phys_id = free_list.pop()
    block_table[seq_id, p // B] = phys_id
    refcount[phys_id] = 1
# Otherwise we just write into the next slot of the existing last block.

# Then write K[p], V[p] into the appropriate slot.
\`\`\`

The block table grows by exactly one entry every MATHPLACEHOLDER22ENDMATH decoded tokens; in between, the existing trailing block is refilled.

### Sequence finish (EOS or cap reached)

\`\`\`python
for phys_id in block_table[seq_id]:
    if phys_id == -1: break
    refcount[phys_id] -= 1
    if refcount[phys_id] == 0:
        free_list.push(phys_id)
block_table[seq_id, :] = -1
\`\`\`

Refcounts exist because multiple sequences may share a phys block.

\`\`\`
═══════════════════════════════════════════════════════════════════════
                            HBM (GPU memory)
═══════════════════════════════════════════════════════════════════════

  ① KV Pool (global, fixed shape, N phys blocks)

     phys 0    phys 1   phys 2    ...    phys 7    ...    phys N-1
     ┌─────┐  ┌─────┐  ┌─────┐           ┌─────┐          ┌─────┐
     │  K  │  │  K  │  │  K  │           │  K  │          │  K  │

     └─────┘  └─────┘  └─────┘           └─────┘          └─────┘

     Each block: 2 · B · H · D · sizeof(dtype) bytes

  ③ Per-step query inputs/outputs (during decode)
     Q : (num_seqs, H, D)        one query token per sequence
     O : (num_seqs, H, D)        attention output for this step

\`\`\`

   m_i, l_i, O_acc                          online softmax state

SRAM, refreshed each inner-loop iteration:
   k_tile                    (B, D)
   v_tile                    (B, D)

The inner loop iterates over logical blocks of this sequence:

\`\`\`
for k_logical_block in range(num_blocks):

The only thing PagedAttention adds over a FlashAttention-style kernel is the \`block_table_row[k_logical_block]\` lookup. The loop structure, the online softmax, and the SRAM residency pattern are otherwise identical.

## What Paging Enables Beyond Memory Savings

The memory utilization win is the headline number — vLLM reports moving KV cache utilization from \\~30% to >95%. The more durable consequence is that **sharing KV state across sequences becomes nearly free**. Once K, V live in addressable, fixed-size blocks, "sequence A and sequence B share a prefix" reduces to "their block tables share the first few entries."

This makes a class of features tractable that are nearly impossible under contiguous max-length allocation:

- **Prefix / prompt caching.** When many requests share the same system prompt or instruction, the prompt's KV cache exists in HBM as a single set of phys blocks. Each request's block table points to those blocks for the shared prefix and only diverges where its own tokens begin. Memory cost drops from MATHPLACEHOLDER38ENDMATH to MATHPLACEHOLDER39ENDMATH.
- **Beam search and parallel sampling.** MATHPLACEHOLDER40ENDMATH candidate continuations of the same prompt share the prefix's phys blocks until they diverge; after divergence each beam allocates its own blocks. The saving is roughly MATHPLACEHOLDER41ENDMATH prefix length.
- **Copy-on-write.** When a shared block must be modified by one of its sharers, the writer first allocates a fresh block, copies the contents, updates its own block table, and decrements the original's \`refcount\` — directly mirroring OS COW semantics.
- **Swap.** Inactive sequences can have their phys blocks evicted to CPU memory and their block-table entries marked as swapped; reactivation swaps them back.

None of these features are practical with contiguous, max-length KV allocations. They are all consequences of the paged layout.

## Kernel: Standard Attention with One Indirection

The PagedAttention kernel differs from a FlashAttention-style attention kernel in exactly one place: the K, V address computation.

Standard FlashAttention inner loop:

\`\`\`python
for start_n in range(0, N, BK):
    k = tl.load(K_base + offs_n[:, None] * stride_kn + ...)
    v = tl.load(V_base + offs_n[:, None] * stride_vn + ...)
    # online softmax 5 steps
\`\`\`

PagedAttention inner loop:

\`\`\`python
for k_logical_block in range(num_blocks):
    phys_id = tl.load(block_table_ptr + k_logical_block)   # ← extra step
    k = tl.load(KV_pool_K_base + phys_id * block_stride + ...)
    v = tl.load(KV_pool_V_base + phys_id * block_stride + ...)
    # online softmax 5 steps (identical to FlashAttention)
\`\`\`

Two observations:

1. **The indirection happens once per block, not once per token.** The cost is amortized over MATHPLACEHOLDER42ENDMATH tokens.
2. **K and V within a phys block remain contiguous**, so the load that fetches a MATHPLACEHOLDER43ENDMATH tile is still a single coalesced burst — exactly like the FlashAttention case.
