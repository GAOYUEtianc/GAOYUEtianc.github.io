  <script>
    const markdownContent = `# Understanding AI Agents: Architecture, Scaling, Memory, and Self-Improvement

I've built multiple AI agents, but understanding their design principles always felt fragmented. Fortunately, Stanford's CS329A changed that—it traces the evolution of agent architectures from first principles, showing how each innovation emerged from solving specific limitations. After reading all papers from its reading list, I've reorganized the key concepts here in a more narrative-driven format: from ReAct to Reflexion, from test-time scaling to train-time RL, from memory-as-text to memory-as-representation.

## 1. Foundation: Evolution of Agent Architectures

### ReAct: The Starting Point

The simplest agent follows a three-step loop: **Thought → Action → Observation**. This is ReAct.

Here's how it works in practice. You give the agent a few-shot prompt showing examples of this loop. At each step:

1. **Thought**: The agent reasons about what to do next (task decomposition, intention detection, etc.)
2. **Action**: It executes something—calls a tool, generates content, or queries a database
3. **Observation**: The system observes the result and feeds it back as a new prompt

Then the loop repeats until the task is done.

The limitation? ReAct is terrible at error correction. If it makes a mistake in step 3, the mistake will be carried over into the next loops. It has no mechanism to look back and think what if sth does not work, or whether to try sth else.

**Side note**: LangChain has a variant of ReAct called "plan-and-execute" where the loop is different—first the agent drafts a plan, then executes multiple steps, then gives all results back to the planner to decide whether to continue or declare completion. It's still forward-only though.

### Evolution to **Reflexion**

Reflexion fixes ReAct's biggest weakness by adding a feedback loop. Four components work together:

1. **Actor**: Takes actions (can be a ReAct agent or CoT-style reasoning agent)
2. **Evaluator**: Generates reward signals—a score, binary correct/incorrect, etc. (LLM-as-judge or rule-based)
3. **Self-reflection model**: When the task fails, this analyzes the trajectory + evaluator signal + memory to generate textual reflection ("why did this fail? how to improve?")
4. **Memory**: Stores reflections for future use

The workflow is as follows:

\`\`\`markdown
Actor uses short-term + long-term memory as context
  ↓
Takes action
  ↓
Evaluator judges the result
  ↓
If failure: Reflection model writes analysis → stored in long-term memory
  ↓
Next episode uses this reflection as context
\`\`\`

Note that the Memory has two tiers:

- **Short-term**: Current episode's trajectory
- **Long-term**: Reflections from past failures

When long-term memory gets too long, oldest entries get evicted.

**Key insight of Reflexion**: Reflection is textual experience, i.e., the agent learns by writing down what went wrong.

### ADAPT: Looking Ahead Through Recursive Planning

Both ReAct and Reflexion share a fundamental limitation: **they can only evaluate the current step**. They have no look-ahead capability.

ADAPT introduces **dynamic hierarchical decomposition**:

\`\`\`markdown
Planner generates subtasks
  ↓
Executor attempts subtask
  ↓
Can't complete it? → Recursively call Planner to break it down further
  ↓
Repeat until Executor succeeds
\`\`\`

There is a **Controller** component sits between **Planner** and **Executor** that:

- Passes context back and forth
- Decides whether another round of decomposition is needed
- Basically the traffic cop of the system

This feels more like how humans solve complex problems—you don't plan everything upfront, you decompose on-demand when you hit a wall.

### SPRINT: Parallelization Through DAG Execution - Boosting Execution Efficiency

All the above frameworks are sequential, and thus intuitively, it can take long to finish a task. What if some actions don't depend on each other? **SPRINT** framework boosts execution efficiency by constructing a **DAG (directed acyclic graph)** of tasks that can

- Identify which subtasks have no dependencies
- Execute them asynchronously in parallel
- Collect results when they're all done
- Feed them to the next step

This is pure efficiency optimization—same reasoning capability, but faster execution when tasks can be parallelized.

## **2. Test-Time Compute Scaling**

The frameworks we just covered—ReAct, Reflexion, ADAPT—all assume the model generates one reasoning path and tries to get it right. But what if we generate *many* paths and pick the best one? That's test-time compute scaling: **using more inference budget to improve performance without changing the model itself**.

### The Power Law Discovery

**LLM Monkey** made a foundational observation about how sampling scales:

\`log(pass@k) ∝ 1 - (1 - pass@1)^k\`

Translation: If you sample k different solutions, your coverage (probability of getting at least one correct answer) grows **log-linearly** with k.

That sounds great, but there's a catch: **precision still sucks**. You might have 10 candidate answers, one of which is correct—but which one? Just sampling more doesn't solve the verification problem.

### Improving Sampling Efficiency

**PRM vs ORM: Credit Assignment Matters**

There are two ways to score reasoning trajectories:

**Outcome Reward Model (ORM)**:

- Looks at the final answer only
- "Is this answer correct? Yes/No"
- Problem: Can't tell **where** the reasoning went wrong

**Process Reward Model (PRM)**:

- Scores each intermediate step
- "Is step 3 reasonable given steps 1-2?"
- Much better credit assignment

**Automated PRM: The Completer-Estimator Trick**

Despite of the superiority of process reward model, hand-labeling process rewards is expensive. Can we automate it?

**The idea**: For each step i in a reasoning chain:

1. **Completer** generates N possible continuations from step i to the end
2. **Estimator** checks how many lead to correct final answers
3. Estimate success probability of step i based on these N rollouts

Two variants:

- **Hard estimator**: Binary—did **any** rollout succeed?
- **Soft estimator**: Fraction—how many out of N succeeded?

This is Monte Carlo tree search intuition: judge a move by simulating random games from that position.

### WEAVER : Weak Supervision Verifier Framework

What if you don't have ground truth labels, but you have multiple imperfect evaluators (say, 5 different LLMs)?

**WEAVER's insight**: Learn each evaluator's reliability on your dataset, then combine their votes using Bayes' theorem.

**The process**:

1. **Sample** some problems, generate answers
2. **Collect** each evaluator's scores (5 evaluators × N answers)
3. **Normalize** scores (each evaluator has different scales)
4. **Remove outliers** (if one evaluator wildly disagrees with others)
5. **Binarize** scores (convert to correct/incorrect)
6. **Train**: Estimate each evaluator's TP rate and TN rate on this dataset
7. **Deploy**: When evaluators vote on new answers, use Bayesian posterior:

The key theory behind this approach is Bayes :

\`P(correct | votes) = P(votes | correct) × P(correct) / P(votes)\`

**The assumption**: Evaluators are independent (though in practice they're often correlated since they use similar architectures or data).

**Why this works**: Even if each evaluator is only 70% accurate, combining 5 of them with learned priors can get you to 95%+ accuracy.

### ARCHON: Searching Over Architectures

We've been talking about sampling multiple *outputs*. **ARCHON** asks: what if we also search over different system architectures?

**The components of ARCHON**: generator, critic, ranker, fuser, verifier, unit test

**Example architecture**:

\`\`\`markdown
10 generators each produce an answer
  ↓
Critic analyzes their strengths/weaknesses
  ↓
Ranker sorts them
  ↓
Fuser combines top 5 into new candidates
  ↓
Another critic layer
  ↓
Another ranker
  ↓
Final fuser
\`\`\`

**The meta-problem of ARCHON**: How many layers? How many components per layer? Which component types?

**ARCHON's solution**: Treat architecture as hyper-parameters, use Bayesian optimization on a sample set to find the best configuration.

This is test-time scaling taken to its logical extreme—not just sampling more, but searching over entire computational graphs.

### The Fundamental Trade-off: Small Model + Sampling vs Large Model

We've explored frameworks that improve agent performance through test-time sampling. But how much improvement is actually possible? This is where the power law becomes revealing.

**Macro view**: The power law \`log(pass@k) ∝ 1-(1-pass@1)^k\` holds across a dataset because difficulty has a **long-tail distribution**. Some problems are hard, most are easy.

**Micro view**: For any *individual* problem, \`log(pass_i@k)\` grows **exponentially** with k (not log-linearly). If a model can solve it, sampling will find the solution quickly.

**The implication**:

- **Simple problems** (no long tail): Small model + heavy sampling is compute-optimal
- **Hard problems** (long tail): Large model + light sampling wins

Why? If all problems are easy for the model, pass@1 is already high, so you don't need a bigger model—just sample a few times with the small one. But if problems are hard and pass@1 is near zero, sampling 1000 times with a weak model still won't help—you need more model capacity.

### Compute-Optimal Allocation

Let's make this trade-off on model size V.S. sampling size concrete with FLOPs.

For a model with N parameters:

- **Training**: 6N × num_tokens FLOPs (backward pass requires twice the parameters of a forward pass)
- **Inference**: 2N × num_tokens FLOPs

Notice inference is 3× cheaper per token than training.

**The key question**: Given a fixed compute budget, what's the optimal ratio R = D_train / D_inference?

**The answer**: It depends on your problem distribution.

If your problems have:

- **Narrow difficulty range** (all easy or all hard): Invest in training, minimal sampling
- **Long-tail distribution** (mix of easy and hard): Balance training and sampling
- **Verifiable outputs** (like code): Heavy sampling + verification beats training

This is why AlphaCode samples 10^5 programs—code can be tested. But for creative writing, you'd rather train a better base model than sample 100k drafts.

**The takeaway**: Test-time scaling isn't always the answer. Sometimes you should just train a better model.

## 3. Train-Time Scaling: The RL Revolution

Test-time scaling helps you *find* the right answer among many candidates. But what if we could teach the model to generate better reasoning in the first place? That's train-time scaling—using RL to reshape the policy itself.

### The Philosophy Shift

Instead of "sample 100 times and pick the best," we want "sample once and it's probably right."

**The three-layer structure of agent capability**:

1. **Base model**: Can it even generate candidate reasoning paths?
2. **Search/Sampling**: Can it explore different trajectories?
3. **RL Optimization**: Which trajectories get reinforced?

RL is the *‘activation function’* for train-time scaling. Without it, you're just hoping the pre-training distribution already contains good reasoning. With RL, you systematically increase the probability of good trajectories.

All modern reasoning RL ultimately optimizes the same thing:

The question is: **how** do we compute this expectation? That's where the algorithms differ.

### Phase 1: From PPO to GRPO

**Why PPO Fails for Long CoT?**

PPO was designed for robotics and games etc. It assumes:

- Dense rewards (reward at every step)
- Stable episode length
- Value function can estimate future returns

**Long chain-of-thought breaks all of these assumptions**:

- Rewards are sparse (only at the end: correct/incorrect)
- Trajectories vary wildly in length (3 steps vs 50 steps)
- Credit assignment is impossible—which of the 50 reasoning steps caused success?

The value function becomes noise instead of signal. You're trying to estimate "how good is step 21 out of 50?" with no intermediate feedback. The value model just confuses the optimization.

**GRPO's Key Insight: You Don't Need Absolute Value**

**The breakthrough**: For reasoning tasks, you don't need to know "how good is this trajectory in absolute terms?" You only need to know "is this trajectory better than the others I sampled?"

**GRPO's algorithm**:

1. For the same prompt, sample G reasoning paths
2. Get final reward for each (correct = +1, wrong = 0, or more nuanced scoring)

4. Update policy based on relative performance

**What this eliminates**:

- No value function!
- No critic network!
- No bootstrapping!
- ✅ Just large-scale sampling + relative comparison

Note that the loss function for GRPO is MATHPLACEHOLDER2ENDMATH, where MATHPLACEHOLDER3ENDMATH is the probability ratio.

**Why this works intuitively**: If 8 out of 10 sampled answers are wrong and 2 are right, those 2 get positive advantage, the 8 get negative advantage. The model learns to do more of what worked, less of what didn't—relative to its current capability.

### Phase 2: GRPO's Failure Modes

GRPO scaled reasoning to new heights, but it crashes when you push harder. Why?

**Problem 1: Entropy Collapse**

GRPO uses **trajectory-level loss**: the entire reasoning chain gets one reward, averaged across all tokens.

What happens:

- Gradient gets diluted by sequence length T
- A 50-step reasoning chain means each token's gradient is 1/50th of the total signal
- Intermediate errors get masked if the final answer happens to be correct
- The model gets more and more confident (entropy collapses) without actually improving

**Problem 2: Gradient Vanishing**

If all G samples for a prompt are correct → all advantages ≈ 0 → no gradient.
If all G samples are wrong → same problem.

GRPO only learns when there's disagreement within the group. But as the model gets better, problems become "too easy" (all correct) or "too hard" (all wrong), and training stalls.

**Problem 3: Long CoT Signal Sparsity**

The longer the reasoning chain, the weaker the credit assignment. A 100-token CoT with one subtle error in step 47 still gets grouped with completely wrong answers because the final answer is wrong.

Here's what surprised me: **Simple, verifiable rule-based reward + massive sampling > learned reward model**
This is the opposite of the RLHF worldview (where careful reward modeling is everything).

Why does this work for reasoning?

- Math/code problems have ground truth verifiers
- Sampling 1000 trajectories gives you dense coverage
- Simple reward (correct = +1) is unambiguous
- The model learns from correct reasoning patterns, not from fitting a potentially misaligned reward model

When verification is cheap and objective, you don't need sophisticated reward modeling—you need scale.

**In summary**, the evolution PPO → GRPO → DAPO is a story of making the RL signal cleaner, more fine-grained, and more stable as we scale to harder problems and longer reasoning. But in a unified view, All these algorithms optimize the same objective : MATHPLACEHOLDER15ENDMATH

The key shift: **LLM becomes the memory manager**. Instead of a fixed retrieval algorithm, the LLM itself decides when to search, what to write, and when to evict.

MemGPT gives you **explicit control**, but you're still limited by database size and retrieval quality. Memory is external, not part of the model's weights.

    dataset.add((q, y))
\`\`\`

**Step 2: Train the prefix KV**

\`\`\`python
for (q, y_target) in dataset:
    # Teacher: use full corpus context
    with torch.no_grad():
        logits_teacher = model(
            input_ids=concat(corpus_tokens, query_tokens)
        )
    
    # Student: use learned prefix
    logits_student = model(
        input_ids=query_tokens,
        past_key_values=[
            (K_l.unsqueeze(0), V_l.unsqueeze(0))  # batch dim
            for K_l, V_l in zip(cartridge.K, cartridge.V)
        ]
    )
    
    # Knowledge distillation loss on answer tokens
    loss = KL_divergence(
        log_softmax(logits_student / T),
        softmax(logits_teacher / T)
    )
    
    # Gradients flow to prefix KV only
    loss.backward()
    optimizer.step()  # only updates cartridge.K, cartridge.V
\`\`\`

Each layer's prefix KV learns to "answer" the queries that the model will ask at that layer.

Training adjusts these slots so that when a query comes in, the model's attention naturally flows to the right "memory" at each layer.

**Comparison to Prefix Tuning**

**Prefix Tuning** (for task adaptation):

- Learn task-specific prefix tokens
- Goal: Adapt model behaviour for a task (e.g., "always respond formally")
- Prefix influences *how* the model responds

**CARTRIDGES** (for knowledge compression):

- Learn corpus-specific prefix KV
- Goal: Compress knowledge from documents
- Prefix provides *what* the model knows

Both use the same mechanism (trainable prefix), but optimize for different objectives.

**The Limitation**

CARTRIDGES work best for **static, offline knowledge**:

- Documentation that doesn't change often
- Historical records
- Reference materials

They're less suitable for:

- Dynamic, frequently updated information
- Personalized, session-specific context
- Information that needs to be forgotten

### The Three Memory Generations Compared

| Aspect | Gen 1: Text | Gen 2: System | Gen 3: Representation |
| --- | --- | --- | --- |
| **Memory location** | External DB | External DB + Prompt | Learned KV cache |
| **Retrieval** | Fixed algorithm | LLM-controlled | Attention mechanism |
| **Learning** | None | None | Gradient-based |
| **Flexibility** | Low | High | Low (frozen after training) |
| **Capacity** | DB size limit | DB size limit | Parameter count |
| **Best for** | Semantic search | Dynamic sessions | Static knowledge |

## **5. Search Integration & Self-Improvement**

We've covered how agents reason, scale, and remember. But what about tasks that require external knowledge the model doesn't have? That's the biggest pain point of most agents, and also where search comes in—not just web search, but systematic exploration of external information spaces.
"Self-improvement" here doesn't mean weight updates. It means the agent systematically expands its solution space through search, retrieval, and structured filtering to converge on better answers at inference time.

### Three Routes to Search-Augmented Intelligence

### Route 1: ReAct/Toolformer — Reasoning Triggers Search

The classic approach: make search part of the reasoning process.

The agent generates thoughts like:

\`\`\`python
Thought: I need to know the current GDP of Brazil to answer this.
Action: search("Brazil GDP 2025")
Observation: [search results]
Thought: Based on the search results, Brazil's GDP is...
\`\`\`

Search becomes a **reasoning state transition**—the model's internal reasoning triggers external knowledge retrieval.

**The problem**: Documents can hijack attention. Search results come from a very different token distribution than the model's reasoning chains. When you inject raw search snippets into the reasoning context, the model's internal reasoning state gets diluted.

### Route 2: Search-o1 — Double Agent Architecture

**DeepSeek's insight**: Separate the agent that searches from the agent that reasons.

**Why this matters**: Search and reasoning have conflicting goals:

- **Search** needs high recall
- **Reasoning** needs high precision

Using the same agent for both causes **token distribution shift**—the model trying to simultaneously be a librarian and a mathematician.

**The architecture**:

\`\`\`python
# Reasoning Agent main loop
state = init_reasoning_state(question)

while not state.is_finished():
    thought = ReasoningAgent.generate_thought(state)
    
    if ReasoningAgent.detect_uncertainty(thought):
        # Generate search query based on what's missing
        query = ReasoningAgent.generate_search_query(thought)
        
        # Search Agent handles retrieval and compression
        evidence = SearchAgent.search_and_summarize(query)
        
        # Critical: Evidence is structured facts, not raw documents
        state.integrate_evidence(evidence)
    else:
        state.advance(thought)
\`\`\`

**What the Search Agent does**:

\`\`\`python
def search_and_summarize(query):
    # Search Agent's job: find and compress
    docs = search_api(query)
    
    # Read documents (Search Agent specializes in this)
    facts = []
    for doc in docs:
        facts.extend(extract_facts(doc))
    
    # Compress into reasoning-compatible format
    # NOT: raw text paragraphs
    # BUT: structured facts like {"entity": "Brazil", "GDP": "$2.1T", "year": 2024}
    return format_as_structured_facts(facts)
\`\`\`

**Why double agent is necessary**:

1. **Token distribution conflict**: Search documents have different statistical patterns than reasoning chains
2. **Goal misalignment**: Recall vs precision optimization
3. **Context pollution**: Raw documents can override the reasoning state the model has built up

Hence, deep research agents **should** be multi-agent because consumption and reasoning are fundamentally different tasks.

### Route 3: AlphaCode2 — Search Over Model Outputs

Completely different paradigm: don't search external knowledge, search the space of **programs the model can generate**.

**The pipeline**:

\`\`\`
Problem
  ↓
Massive sampling (10^5 – 10^6 programs)
  ↓
Execution & filtering (run tests, keep only passing programs)
  ↓
Behavioral clustering (group programs by I/O behavior)
  ↓
Scoring & reranking (within each cluster, pick best by code quality metrics)
  ↓
Submit top-k (one from each major behavioral cluster)
\`\`\`

**Why this works**:

Performance scales as **log(sample size)**. The more you sample, the more likely you hit a correct solution—but with diminishing returns.

At 10^3 samples: ~30% solve rate
At 10^5 samples: ~70% solve rate

At 10^6 samples: ~85% solve rate

**Core insight**: **search + verification > reasoning** when you have an executable verifier.

For code, you don't need the model to reason perfectly—you need it to generate diverse candidates and let the test suite pick the winner.

This only works in domains with:

- **Cheap verification**: Running code is fast
- **Clear correctness signal**: Tests either pass or fail
- **Diverse solution space**: Multiple programs can solve the same problem

For writing code, writing & optimizing GPU kernels, SQL queries etc, It's dominant.

## 6. Evaluation & Long-Horizon Tasks

Evaluation of agents, especially on long-horizon tasks, is always a pain. 

### The Time-Based Evaluation Lens

Traditional benchmarks ask: "Can the agent solve problem X?"

But a more revealing question is: "How long of a task can the agent complete reliably?"

A paper: *Measuring AI Ability to Complete Long Tasks* answered this question in an innovative but solid way.

**The key metric**: AI can complete human tasks of **X duration** with **Y% success rate**.

For example:

- 5-step tasks: 90% success
- 30-step tasks: 60% success
- 200-step tasks: 20% success

**The empirical finding**: Success probability vs. horizon length follows a **sigmoid-like decline**.

### The Evaluation Landscape

**The critical insight**: Agent capability isn't measured by accuracy on individual tasks, but by **failure-free time**—how long can the agent work reliably before making an unrecoverable mistake? Current agents excel at short tasks with tight feedback loops (coding, math, structured analysis) where verification is cheap and errors are caught immediately. They struggle with multi-hour tasks requiring sustained coherence, **implicit knowledge** that isn't in the prompt, and subjective quality judgments where there's no clear optimization target. From a personal perspective, I think implicit knowledge is a main pain point, how to fetch the exact knowledge efficiently - through pre-training, or searching, and how to avoid compounding errors, needs a sophisticated trade-off.
