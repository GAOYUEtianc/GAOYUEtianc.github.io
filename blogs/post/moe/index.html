## Definition of MoE and Basic Architecture

MoE is a **sparse modification** to the Transformer's FFN layer. It replaces a large dense feedforward network with many sparse feedforward networks and a selection layer, allowing you to scale the number of experts without affecting FLOPs.

![MoE.png](https://raw.githubusercontent.com/GAOYUEtianc/GAOYUEtianc.github.io/master/img/MoE.png)

- In most industrial scenarios, the **only difference** between MoE and dense Transformer is **at FFN layer**, and the self-attention layer is not modified.
- MoE can greatly increase the total number of model parameters without increasing forward-pass FLOPs, giving the model greater capacity for knowledge retention and feature learning.

## Major Reason of MoE to Become Major Choice in Industry

### Under same FLOPs, the performance is significantly better than dense model

Based on experiments by Fedus et al. (2022), under the same compute budget, as the number of experts increases, the LM training loss continues to drop — a 128-expert Switch-Base model improves perplexity far faster than T5-Base under the same resources.

OLMoE (2024) also showed that to achieve the same downstream performance, MoE requires 3× fewer FLOPs than a dense model, with 2× faster training speed. 

The gains of MoE do not fully come from assigning tokens to proper experts; they stem more from the parameter expansion benefit of sparse architectures. Even when routing lacks semantic matching ability, engaging more parameters consistently yields gain. 

### Higher Training Efficiency And Effect Cost Ratio

- The 128-expert Switch-Base model achieves 7× training speedup over dense T5-Base, greatly shortening the training cycle.
- All top open-source models — DeepSeek-V2/V3, Mixtral, Llama 4, Grok, Qwen, etc. — adopt MoE architecture, achieving SOTA downstream performance with far fewer activated parameters than dense models.

### Self-Adapt to Parallelism Distribution

MoE makes expert parallelism a natural form of parallelization. With multiple independent FFN blocks deployable across devices, and experts sparsely activated, we only need to route each token to its corresponding device and compute there. This provides a natural partitioning point for distributing the model across devices, and is another key reason for MoE's popularity. 

## Challenges of MoE

- **Training stability:** With multiple experts, ensuring each receives sufficient gradient signal is non-trivial. Experts that are rarely routed to may fail to learn effectively, degrading overall model quality.
- **Routing mechanism:** The router must decide, for each token, which expert to activate. Designing a routing strategy that is both efficient and load-balanced is one of the central engineering challenges in MoE.
- **Implementation complexity:** MoE is substantially more complex to implement than dense models, particularly in distributed training settings where expert placement across devices introduces significant (dispatch and all-gather) communication and synchronization overhead.
- **Fine-tuning challenge**: Fine-tuning MoE is prone to divergence and tends to overfit.

## Upcycling

**Upcycling** addresses the "from 0 to 1" training difficulty by initializing a MoE from a pre-trained dense Transformer: copy the FFN/MLP weights into multiple experts, add a router, and continue training. The result is a higher-parameter model that remains sparse at inference time, sidestepping the cold-start instability of training MoE from scratch. 

## General Structure and Design Dimensions of MoE

MoE designs differ mainly along the following three dimensions: 

1. How to design routing function
2. How to set expert sizes
3. How to handle non-differentiable training objectives

### Routing function

Routing decision mainly includes three categories :

2. **expert choice**: Each expert ranks tokens and selects the top-K to process, offering better load-balancing. [More balanced]
3. **global assignment**: Uses complex optimization to achieve balanced expert-token matching with lower communication cost.

In practice, Top-K Gating has several variants. A common one proposed by DeepSeek routes every token to a Shared Expert in addition to the Top-K selection, ensuring each token has at least one dedicated expert. This increases the model's representational capacity.  

#### Choice of K

The choice of K significantly impacts MoE performance. Smaller K reduces compute cost but limits representational capacity; larger K does the inverse. In practice, K=1 or K=2 is the default. 

### Weak Router is Also Powerful

An interesting observation is that even a very weak router (e.g., deterministic hash-based mapping) can outperform dense learned routers. A possible explanation: as long as the mapping is deterministic, each expert consistently sees some sub-distribution of inputs, naturally developing a form of specialization. 

### MoE Experts

In MoE, experts are multiple independent FFN layers, each responsible for a subset of tokens. Each expert is typically an FFN similar in structure to the transformer FFN layer, but with independent parameters. 
The intermediate dimension is typically 4× the input dimension (MATHPLACEHOLDER17ENDMATH), consistent with standard FFN layers. However, DeepSeek's Fine-Grained Experts (Dai et al. 2024) reduce the intermediate dimension while increasing the number of experts, boosting model representational capacity. 

## Training Objectives

A central challenge is how to encourage uniform, efficient expert utilization. 

### RL Based Optimization

MoE routing can be framed as an RL problem: design a reward function to guide the router toward an optimal strategy. However, gradient estimation variance is high and training is unstable, so this approach is rarely used in practice.
