  <div class="container-fluid p-0">
    <section class="resume-section p-3 p-lg-5" id="map">
      <div class="w-100">
        <h2 class="mb-4">Visited Map</h2>

        <div class="legend">
          <div class="legend-item">
            <div class="legend-color legend-visited"></div>
            <span>Visited Country</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background-color: #dc3545; border-radius: 50%;"></div>
            <span>Visited City</span>
          </div>
        </div>

        <div id="world-map" class="map-container"></div>

      </div>
    </section>
  </div>

  <!-- Bootstrap core JavaScript -->
  <script src="vendor/jquery/jquery.min.js"></script>
  <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="vendor/jquery-easing/jquery.easing.min.js"></script>
  <script src="js/resume.min.js"></script>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- TopoJSON support -->
  <script src="https://unpkg.com/topojson-client@3"></script>

  <script>
    // ============================================================
    // EASY CONFIG: Just edit this array to update visited countries!
    // Use numeric country codes from: https://en.wikipedia.org/wiki/ISO_3166-1_numeric
    // Or use the country names directly (both work!)
    // ============================================================

    const visitedCountries = [
      "China",
      "United States of America",
      "Canada",
      "Australia",
      "France",
      "Italy",
      "Vatican",
      "Maldives",
      "Japan",
      "Singapore",
      "Malaysia",
      "Thailand",
      "Germany",
      "Turkey",
    ];

    // Numeric codes as backup (ISO 3166-1 numeric)
    const visitedCountryCodes = [
      156,  // China
      840,  // United States
      124,  // Canada
      36,   // Australia
      250,  // France
      380,  // Italy
      336,  // Vatican
      462,  // Maldives
      392,  // Japan
      702,  // Singapore
      458,  // Malaysia
      764,  // Thailand
      276,  // Germany
      792,  // Turkey
    ];

    // ============================================================
    // VISITED CITIES: Add cities with [latitude, longitude, "Name"]
    // Find coordinates at: https://www.latlong.net/
    // ============================================================
    const visitedCities = [
      [41.8619, 12.5774, "Rome"],
      [48.1351, 11.5820, "Munich"],
      [41.9029, 12.4534, "Vatican City"],
      [1.3521, 103.8198, "Singapore"],
      [41.0082, 28.9784, "Istanbul"],
      [36.8969, 30.7133, "Antalya"],
      [48.8566, 2.3522, "Paris"],
      [35.6762, 139.6503, "Tokyo"],
      [4.1755, 73.5093, "Malé"],
      [5.8450, 73.1651, "Noonu Atoll"],
      [3.1390, 101.6869, "Kuala Lumpur"],
      [40.7128, -74.0060, "New York City"],
      [37.7749, -122.4194, "San Francisco"],
      [37.8715, -122.2730, "Berkeley"],
      [47.6062, -122.3321, "Seattle"],
      [43.6532, -79.3832, "Toronto"],
      [49.2827, -123.1207, "Vancouver"],
      [45.5017, -73.5673, "Montreal"],
      [46.8139, -71.2080, "Quebec City"],
      [45.4215, -75.6972, "Ottawa"],
      [49.8951, -97.1384, "Winnipeg"],
      [53.5461, -113.4938, "Edmonton"],
      [51.0447, -114.0719, "Calgary"],
      [51.1784, -115.5708, "Banff"],
      // Australia
      [-33.8688, 151.2093, "Sydney"],
      [-20.3484, 148.9516, "Hamilton Island"],
      // China
      [20.0458, 110.3203, "Haikou"],
      [18.2528, 109.5117, "Sanya"],
      [19.1022, 108.6536, "Dongfang"],
      [18.5056, 110.0367, "Lingshui"],
      [18.7958, 110.3906, "Wanning"],
      [23.1291, 113.2644, "Guangzhou"],
      [22.5431, 114.0579, "Shenzhen"],
      [22.3193, 114.1694, "Hong Kong"],
      [22.1987, 113.5439, "Macau"],
      [22.2769, 113.5678, "Zhuhai"],
      [25.0406, 102.7123, "Kunming"],
      [22.0088, 100.7979, "Xishuangbanna"],
      [25.6065, 100.2676, "Dali"],
      [26.8550, 100.2241, "Lijiang"],
      [26.6470, 106.6302, "Guiyang"],
      [27.7050, 106.9336, "Zunyi"],
      [30.2741, 120.1551, "Hangzhou"],
      [31.2304, 121.4737, "Shanghai"],
      [32.0603, 118.7969, "Nanjing"],
      [31.2989, 120.5853, "Suzhou"],
      [30.5728, 104.0668, "Chengdu"],
      [36.6512, 117.1206, "Jinan"],
      [37.4638, 121.4478, "Yantai"],
      [36.2003, 117.1206, "Taian"],
      [37.8107, 120.7584, "Penglai"],
      [37.5138, 122.1203, "Weihai"],
      [34.7466, 113.6253, "Zhengzhou"],
      [34.6197, 112.4540, "Luoyang"],
      [38.0428, 114.5149, "Shijiazhuang"],
      [39.9354, 119.6001, "Qinhuangdao"],
      [39.9042, 116.4074, "Beijing"],
      [38.8738, 115.4645, "Baoding"],
      [40.9739, 117.9616, "Chengde"],
      [37.7388, 115.7005, "Hengshui"],
      [40.8151, 111.6708, "Hohhot"],
      // Add more cities: [lat, lng, "City Name"],
    ];

    // ============================================================
    // Map code (no need to modify below)
    // ============================================================

    const visitedStyle = {
      fillColor: '#28a745',
      weight: 1,
      opacity: 1,
      color: '#fff',
      fillOpacity: 0.7
    };

    const notVisitedStyle = {
      fillColor: '#e9ecef',
      weight: 1,
      opacity: 1,
      color: '#adb5bd',
      fillOpacity: 0.5
    };

    const hoverStyle = {
      weight: 2,
      color: '#333',
      fillOpacity: 0.9
    };

    function isVisited(feature) {
      const name = feature.properties.name;
      const id = parseInt(feature.id);
      return visitedCountries.some(c => name && name.includes(c)) ||
             visitedCountryCodes.includes(id);
    }

    document.addEventListener('DOMContentLoaded', async function() {
      const map = L.map('world-map', {
        scrollWheelZoom: false,
        worldCopyJump: true,
        maxBounds: [[-90, -180], [90, 180]],
        maxBoundsViscosity: 1.0
      }).setView([20, 10], 2);

      // Create a pane for city markers so they stay on top
      map.createPane('cityMarkers');
      map.getPane('cityMarkers').style.zIndex = 650;

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20,
        noWrap: true
      }).addTo(map);

      try {
        // Use Natural Earth GeoJSON (cleaner boundaries, no antimeridian issues)
        const response = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json');
        const topology = await response.json();
        const countries = topojson.feature(topology, topology.objects.countries);

        L.geoJSON(countries, {
          style: function(feature) {
            return isVisited(feature) ? visitedStyle : notVisitedStyle;
          },
          onEachFeature: function(feature, layer) {
            const name = feature.properties.name || 'Unknown';
            const visited = isVisited(feature);

            layer.bindTooltip(name + (visited ? ' ✓' : ''), {
              permanent: false,
              direction: 'center'
            });

            layer.on({
              mouseover: function(e) {
                e.target.setStyle(hoverStyle);
                e.target.bringToFront();
              },
              mouseout: function(e) {
                e.target.setStyle(visited ? visitedStyle : notVisitedStyle);
              }
            });
          }
        }).addTo(map);

        // Add city markers (in separate pane so they stay on top)
        visitedCities.forEach(function(city) {
          L.circleMarker([city[0], city[1]], {
            radius: 6,
            fillColor: '#dc3545',
            color: '#fff',
            weight: 2,
            opacity: 1,
            fillOpacity: 0.9,
            pane: 'cityMarkers'
          }).addTo(map).bindTooltip(city[2], {
            permanent: false,
            direction: 'top',
            pane: 'cityMarkers'
          });
        });
      } catch (error) {
        console.error('Error loading map:', error);
      }
    });
  </script>
